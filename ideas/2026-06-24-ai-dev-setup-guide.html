<h2 id="markdown-%E2%86%92-%EC%8A%AC%EB%9D%BC%EC%9D%B4%EB%93%9C-%EC%9E%90%EB%8F%99-%EC%83%9D%EC%84%B1">Markdown → 슬라이드 자동 생성</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="4" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="marp-cli--%EC%99%9C-%ED%95%84%EC%9A%94%ED%95%9C%EA%B0%80">Marp CLI — 왜 필요한가?</h2>
<blockquote>
<p>&quot;PPT 디자인 조정하는 시간을 줄이고, 내용에만 집중하자&quot;</p>
</blockquote>
<p><strong>기존 방식</strong> : PowerPoint/Keynote 열고 → 글자 크기 맞추고 → 정렬하고 → 색 고르고…</p>
<p><strong>Marp 방식</strong> : <code>.md</code> 파일에 내용만 쓰면 → 슬라이드 자동 생성</p>
<div class="cols">
<div class="col">
<h3 id="%EC%96%B8%EC%A0%9C-%EC%93%B0%EB%82%98">언제 쓰나?</h3>
<ul>
<li>발표 자료를 <strong>빠르게</strong> 만들 때</li>
<li><strong>git으로 버전 관리</strong>가 필요한 슬라이드</li>
<li>AI(Claude, GPT)로 내용 생성 후 <strong>바로 슬라이드화</strong></li>
<li>코드 블록이 많은 <strong>기술 발표</strong></li>
</ul>
</div>
<div class="col">
<h3 id="%EC%99%9C-%EC%A2%8B%EC%9D%80%EA%B0%80">왜 좋은가?</h3>
<ul>
<li>Markdown = 텍스트 → <strong>git commit 가능</strong></li>
<li><strong>HTML · PDF · PPT(pptx)</strong> 출력 지원</li>
<li>테마는 CSS로 한 번만 만들면 끝</li>
<li>AI가 내용도 써주고, 슬라이드도 만들어줌</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-LOfLCddb="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="5" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="marp-cli--%EC%84%A4%EC%B9%98--%EC%82%AC%EC%9A%A9%EB%B2%95">Marp CLI — 설치 &amp; 사용법</h2>
<div class="cols">
<div class="col">
<pre><code class="language-bash"><span class="hljs-comment"># 설치</span>
npm install -g @marp-team/marp-cli

<span class="hljs-comment"># MD → HTML 슬라이드 (가장 많이 씀)</span>

<span class="hljs-comment"># MD → PPT</span>
marp slide.md -o slide.pptx

</code></pre>
</div>
<div class="col">
<p><strong>MD 파일 맨 위 — Marp 모드 활성화 선언:</strong></p>
<pre><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">default</span>   <span class="hljs-comment"># gaia / uncover / 커스텀 CSS 가능</span>
<span class="hljs-attr">paginate:</span> <span class="hljs-literal">true</span>
<span class="hljs-meta">---
</span>
<span class="hljs-comment"># 1번 슬라이드 내용</span>

<span class="hljs-meta">---
</span>
<span class="hljs-comment"># 2번 슬라이드 — --- 로 페이지 구분</span>
</code></pre>
<blockquote>
<p><strong>AI 활용 팁</strong> : &quot;이 내용으로 Marp 슬라이드 MD 작성해줘&quot; → Claude에 그대로 요청!</p>
</blockquote>
</div>
</div>

<h1 id="2-gog-cli">2. gog CLI</h1>
<h2 id="%EA%B5%AC%EA%B8%80-%EC%84%9C%EB%B9%84%EC%8A%A4%EB%A5%BC-%ED%84%B0%EB%AF%B8%EB%84%90%EC%97%90%EC%84%9C">구글 서비스를 터미널에서</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-marpit-scope-xKlDLIkZ="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="7" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="gog-cli--%EC%99%9C-%ED%95%84%EC%9A%94%ED%95%9C%EA%B0%80">gog CLI — 왜 필요한가?</h2>
<blockquote>
<p>&quot;AI가 내 구글 캘린더에 일정을 직접 넣어줬으면…&quot;</p>
</blockquote>
<p><strong>gog</strong> = Google-on-CLI. 터미널에서 구글 서비스를 직접 호출하는 도구</p>
<div class="cols">
<div class="col">
<h3 id="%EC%96%B8%EC%A0%9C-%EC%93%B0%EB%82%98-1">언제 쓰나?</h3>
<ul>
<li>AI(Claude, Codex)가 <strong>캘린더 일정 자동 생성/조회</strong></li>
<li>스크립트로 <strong>Google Drive 파일 자동 업로드</strong></li>
<li><strong>Gmail 발송 자동화</strong> (알림 메일, 리포트 등)</li>
<li>Claude Code에서 <strong>구글 슬라이드 자동 생성</strong></li>
</ul>
</div>
<div class="col">
<h3 id="%EC%84%A4%EC%A0%95-%ED%9D%90%EB%A6%84-%EA%B0%9C%EB%85%90">설정 흐름 (개념)</h3>
<pre><code>1. gog auth login
   → 브라우저에서 구글 로그인
   → OAuth2 토큰이 로컬에 저장됨

2. 이후 터미널에서 바로 사용
   gog calendar list
   gog drive upload report.pdf
   gog slides create &quot;발표제목&quot;
</code></pre>
</div>
</div>
<blockquote>
<p><strong>설정 주의</strong> : 처음 인증 시 keyring 설정 필요. 서버(headless)는 <code>--manual</code> 플래그로 처리.<br />
구글 OAuth 앱 등록이 필요해서 초기 설정이 좀 번거로움 — 한 번만 하면 끝!</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="sec" data-theme="clean" lang="ko-KR" class="sec" data-marpit-pagination="8" style="--paginate:true;--class:sec;--theme:clean;" data-marpit-pagination-total="27">
<h1 id="3-tailscale">3. Tailscale</h1>
<h2 id="ip-%EA%B3%B5%EA%B0%9C-%EC%97%86%EC%9D%B4-%EC%96%B4%EB%94%94%EC%84%9C%EB%82%98-%EC%95%88%EC%A0%84%ED%95%98%EA%B2%8C-%EC%97%B0%EA%B2%B0">IP 공개 없이 어디서나 안전하게 연결</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="9" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="tailscale--%EC%99%9C-%ED%95%84%EC%9A%94%ED%95%9C%EA%B0%80">Tailscale — 왜 필요한가?</h2>
<blockquote>
<p>&quot;집 컴퓨터를 카페에서 쓰고 싶은데, 포트를 열면 해킹 위험…&quot;</p>
</blockquote>
<p><strong>기존 방식</strong> : 공유기 포트 포워딩 → 내 IP/포트가 인터넷에 노출 → 보안 취약</p>
<p><strong>Tailscale</strong> : WireGuard 기반 메시 VPN — <strong>아무것도 외부에 공개하지 않고 연결</strong></p>
<div class="cols">
<div class="col">
<h3 id="%EC%9E%91%EB%8F%99-%EC%9B%90%EB%A6%AC">작동 원리</h3>
<pre><code>[카페 노트북]          [집 데스크탑]
 100.64.0.1    ←→     100.64.0.2
      ↑                    ↑
      └── Tailscale 가상 IP ──┘
          (외부 인터넷에 노출 없음)
</code></pre>
<ul>
<li>각 기기에 <strong>가상 사설 IP</strong> (100.x.x.x) 부여</li>
<li>이 IP로만 통신 → 방화벽/포트포워딩 불필요</li>
</ul>
</div>
<div class="col">
<h3 id="%EC%96%B8%EC%A0%9C-%EC%93%B0%EB%82%98-2">언제 쓰나?</h3>
<ul>
<li><strong>집 서버에 카페에서</strong> 안전하게 접속</li>
<li>AI 코딩 중 <strong>다른 컴퓨터 자원 활용</strong></li>
<li>팀원과 <strong>로컬 개발 서버 공유</strong> (포트 오픈 없이)</li>
<li>Codex / opencode-go의 <strong>원격 머신 접근 허용</strong></li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-scope-dd2Wlb1T="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="10" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="tailscale--%EC%84%A4%EC%B9%98--%EC%84%A4%EC%A0%95">Tailscale — 설치 &amp; 설정</h2>
<div class="cols">
<div class="col">
<pre><code class="language-bash"><span class="hljs-comment"># 설치 (Ubuntu/Debian)</span>
curl -fsSL https://tailscale.com/install.sh | sh

<span class="hljs-comment"># 로그인 — 브라우저에서 구글/깃허브 계정으로 승인</span>
<span class="hljs-built_in">sudo</span> tailscale up

<span class="hljs-comment"># 내 Tailscale IP 확인</span>
tailscale ip -4
<span class="hljs-comment"># → 100.x.x.x (이 IP로 기기 간 통신)</span>

<span class="hljs-comment"># 연결된 기기 목록 확인</span>
tailscale status
</code></pre>
</div>
<div class="col">
<p><strong>접속 예시 :</strong></p>
<pre><code class="language-bash"><span class="hljs-comment"># 집 컴퓨터에 SSH (Tailscale IP 사용)</span>
ssh username@100.64.0.2

<span class="hljs-comment"># SSH config 파일로 단축키 등록</span>
<span class="hljs-comment"># ~/.ssh/config</span>
Host home
  HostName 100.64.0.2
  User kabkee
</code></pre>
<blockquote>
<p><strong>AI 연동 팁</strong> : Codex / opencode-go / z.ai 같은 오픈소스 모델도<br />
Tailscale IP로 로컬 서버에 안전하게 연결 가능!</p>
</blockquote>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-class="sec" data-theme="clean" lang="ko-KR" class="sec" data-marpit-pagination="11" style="--paginate:true;--class:sec;--theme:clean;" data-marpit-pagination-total="27">
<h1 id="4-openvpn">4. OpenVPN</h1>
<h2 id="%EA%B8%B0%EA%B4%80-%EB%82%B4%EB%B6%80%EB%A7%9D%EC%9D%84-%EC%99%B8%EB%B6%80%EC%97%90%EC%84%9C-%EC%98%B5%EC%85%98">기관 내부망을 외부에서 (옵션)</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="12" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="openvpn--%EC%96%B8%EC%A0%9C-%ED%95%84%EC%9A%94%ED%95%9C%EA%B0%80">OpenVPN — 언제 필요한가?</h2>
<blockquote>
<p>Tailscale로 개인 기기 연결은 해결. 학교·회사 내부망은 OpenVPN.</p>
</blockquote>
<p><strong>Tailscale vs OpenVPN 비교</strong></p>
<table>
<thead>
<tr>
<th>항목</th>
<th style="text-align:center">Tailscale</th>
<th style="text-align:center">OpenVPN</th>
</tr>
</thead>
<tbody>
<tr>
<td>설정 난이도</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b50.svg" data-marp-twemoji=""/> 쉬움</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b50.svg" data-marp-twemoji=""/><img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b50.svg" data-marp-twemoji=""/><img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b50.svg" data-marp-twemoji=""/> 어려움</td>
</tr>
<tr>
<td>주요 용도</td>
<td style="text-align:center">개인 기기 간 연결</td>
<td style="text-align:center">기관 내부망 접속</td>
</tr>
<tr>
<td>VPN 서버</td>
<td style="text-align:center">불필요 (Tailscale이 중계)</td>
<td style="text-align:center">필요 (학교/회사가 운영)</td>
</tr>
<tr>
<td>속도</td>
<td style="text-align:center">빠름 (P2P)</td>
<td style="text-align:center">중간 (서버 경유)</td>
</tr>
<tr>
<td>보안 설정</td>
<td style="text-align:center">자동</td>
<td style="text-align:center">수동 (인증서 등)</td>
</tr>
</tbody>
</table>
<p><strong>언제 쓰나?</strong></p>
<ul>
<li>학교/회사 <strong>내부 시스템</strong> 외부에서 접속</li>
<li>학교 도서관 <strong>전자 학술 자료</strong> 외부 이용</li>
<li>인턴/취업 후 <strong>사내망 접속</strong> (IT팀이 설정 파일 제공)</li>
</ul>
<blockquote>
<p><strong>결론</strong> : 개인 프로젝트 → <strong>Tailscale 우선</strong>, 기관망 접속 → <strong>OpenVPN</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-class="sec" data-theme="clean" lang="ko-KR" class="sec" data-marpit-pagination="13" style="--paginate:true;--class:sec;--theme:clean;" data-marpit-pagination-total="27">
<h1 id="5-hermes-agent">5. Hermes Agent</h1>
<h2 id="%EC%93%B8%EC%88%98%EB%A1%9D-%EB%82%98%EB%A5%BC-%EC%95%84%EB%8A%94-ai-%ED%8C%8C%ED%8A%B8%EB%84%88">쓸수록 나를 아는 AI 파트너</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="14" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="hermes-agent--%EC%99%9C-%ED%8A%B9%EB%B3%84%ED%95%9C%EA%B0%80">Hermes Agent — 왜 특별한가?</h2>
<blockquote>
<p>&quot;ChatGPT는 매번 처음부터 설명해야 하는데… 나를 기억하는 AI가 있으면?&quot;</p>
</blockquote>
<p><strong>Hermes Agent</strong> = 자가 학습 + 영구 기억 + 개인화 AI 에이전트</p>
<div class="cols">
<div class="col">
<h3 id="%EC%9D%BC%EB%B0%98-ai-vs-hermes">일반 AI vs Hermes</h3>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:center">일반 AI</th>
<th style="text-align:center">Hermes</th>
</tr>
</thead>
<tbody>
<tr>
<td>기억</td>
<td style="text-align:center">대화 종료 시 소멸</td>
<td style="text-align:center"><strong>영구 누적</strong></td>
</tr>
<tr>
<td>개인화</td>
<td style="text-align:center">없음</td>
<td style="text-align:center"><strong>쓸수록 강해짐</strong></td>
</tr>
<tr>
<td>접근</td>
<td style="text-align:center">브라우저</td>
<td style="text-align:center">Telegram · Slack · Discord</td>
</tr>
<tr>
<td>운영</td>
<td style="text-align:center">클라우드 종속</td>
<td style="text-align:center"><strong>내 서버 자율 운영</strong></td>
</tr>
<tr>
<td>비용</td>
<td style="text-align:center">구독료</td>
<td style="text-align:center">오픈소스 (무료~저렴)</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%EC%96%B8%EC%A0%9C-%EC%93%B0%EB%82%98-3">언제 쓰나?</h3>
<ul>
<li><strong>나만의 AI 비서</strong> (일정 · 메모 · 알림 관리)</li>
<li>공부 내용 누적 → <strong>나중에 질문하면 기억함</strong></li>
<li>Telegram에서 <strong>언제 어디서나</strong> AI와 소통</li>
<li>반복 작업 자동화 (알림, 요약, 분류 등)</li>
<li>openclaw의 <strong>오픈소스 대체</strong> — 무료로 운영</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-S613QTRv="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="15" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="hermes-agent--%EC%9A%B4%EC%98%81-%EB%B0%A9%EC%8B%9D">Hermes Agent — 운영 방식</h2>
<div class="cols">
<div class="col">
<p><strong>두 가지 운영 방식 중 선택</strong></p>
<pre><code>A. 외부 서버 설치 (24시간 운영 추천)
   ─────────────────────────────
   [집 서버 or Oracle Free Tier (무료)]
   → Tailscale로 보안 접근
   → 24시간 켜 있어서 언제든 응답
   → 새벽에 물어봐도 즉시 답변

B. 개인 노트북 설치 (Hermes Desktop)
   ─────────────────────────────
   → 노트북 켤 때만 활성화
   → 가볍게 시작하기 좋음
</code></pre>
</div>
<div class="col">
<p><strong>채널 연동 설정 (개념)</strong></p>
<pre><code>Hermes → Telegram Bot 토큰 설정
       → Slack Webhook URL 등록
       → Discord Bot 연결

사용 예:
  텔레그램에서
  &quot;오늘 내 일정 정리해줘&quot;
  → Hermes가 내 데이터 기반
    개인화 응답
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="sec" data-theme="clean" lang="ko-KR" class="sec" data-marpit-pagination="16" style="--paginate:true;--class:sec;--theme:clean;" data-marpit-pagination-total="27">
<h1 id="6-%EC%9B%90%EA%B2%A9-%EC%BB%B4%ED%93%A8%ED%84%B0-%EC%97%B0%EB%8F%99">6. 원격 컴퓨터 연동</h1>
<h2 id="ssh--%EC%9B%90%EA%B2%A9-%EB%8D%B0%EC%8A%A4%ED%81%AC%ED%83%91--nomachine">SSH · 원격 데스크탑 · NoMachine</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-xp5sAsum="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="17" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="%EC%9B%90%EA%B2%A9-%EC%A0%91%EC%86%8D-%EB%B0%A9%EB%B2%95-3%EA%B0%80%EC%A7%80">원격 접속 방법 3가지</h2>
<div class="cols">
<div class="col">

<h2 id="codex%EB%A1%9C-%EC%9B%90%EA%B2%A9-%EC%84%9C%EB%B2%84-ssh-%EC%A0%91%EC%86%8D">Codex로 원격 서버 SSH 접속</h2>

<p>Codex CLI가 SSH 명령을 대신 실행 — 명령어 몰라도 자연어로 OK!</p>

<div class="cols">
<div class="col">
<pre><code class="language-bash"><span class="hljs-comment"># Codex 설치</span>

<span class="hljs-comment"># 자연어로 SSH 작업 지시</span>

<span class="hljs-comment"># 자동 승인 모드 (바로 실행)</span>
codex --approval-mode full-auto \
  <span class="hljs-string">&quot;ssh kabkee@100.64.0.2 \
  &#x27;ls ~/projects &amp;&amp; df -h&#x27;&quot;</span>
</code></pre>
</div>

→ ssh 접속 후 자동 실행

&quot;로그 마지막 100줄 보여줘&quot;
→ 결과 요약까지 해줌

&quot;오류 나는 파일 찾아서 수정&quot;

<h1 id="%EB%B3%B4%EB%84%88%EC%8A%A4-claude-code-%ED%86%A0%ED%81%B0-%EC%A0%88%EC%95%BD">보너스: Claude Code 토큰 절약</h1>
<h2 id="rtk--serena--claude-code-%EC%A0%84%EC%9A%A9-%EC%B5%9C%EC%A0%81%ED%99%94-2%EC%A2%85-%EC%84%B8%ED%8A%B8">RTK + Serena — Claude Code 전용 최적화 2종 세트</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-marpit-scope-cwGCZseA="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="23" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="claude-%ED%86%A0%ED%81%B0-%EC%B5%9C%EC%A0%81%ED%99%94--rtk--serena">Claude 토큰 최적화 — RTK &amp; Serena</h2>
<blockquote>
<p>Claude Code를 쓴다면: 토큰 = 비용 + 속도. 두 도구로 60~90% 절약 가능.</p>
</blockquote>
<div class="cols">
<div class="col">
<h3 id="%F0%9F%A6%80-rtk-rust-token-killer"><img class="emoji" draggable="false" alt="🦀" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f980.svg" data-marp-twemoji=""/> RTK (Rust Token Killer)</h3>
<p><strong>문제</strong> : <code>git status</code>, <code>cat</code> 출력이 그대로 컨텍스트에 들어가 토큰 낭비</p>
<p><strong>해결</strong> : Claude Code Hook으로 명령 출력을 <strong>자동 필터링</strong></p>
<pre><code class="language-bash"><span class="hljs-comment"># Hook 등록 한 번이면 자동 적용</span>
<span class="hljs-comment"># git status → rtk git status (투명하게 작동)</span>

rtk gain           <span class="hljs-comment"># 절약량 통계 확인</span>
rtk gain --<span class="hljs-built_in">history</span> <span class="hljs-comment"># 명령별 이력 조회</span>
rtk discover       <span class="hljs-comment"># 최적화 가능 명령 탐지</span>
</code></pre>
<ul>
<li>별도 명령 없이 <strong>기존 명령 그대로</strong> 사용</li>
<li>불필요한 출력 라인 제거 → 입력 토큰 대폭 감소</li>
</ul>
</div>
<div class="col">
<h3 id="%F0%9F%94%8D-serena-mcp-%EC%84%9C%EB%B2%84"><img class="emoji" draggable="false" alt="🔍" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f50d.svg" data-marp-twemoji=""/> Serena (MCP 서버)</h3>
<p><strong>문제</strong> : 파일 전체를 Read해야 심볼/참조를 찾을 수 있어 토큰 낭비</p>
<p><strong>해결</strong> : LSP(Language Server) 기반 <strong>정밀 코드 탐색</strong></p>
<pre><code>파일 전체 읽기  →  find_symbol / find_declaration
(수천 토큰)         (필요한 심볼만 수십 토큰)

get_symbols_overview   # 파일 구조 개요만 조회
find_referencing_symbols  # 참조 위치만 추출
</code></pre>
<ul>
<li>코드베이스 이해 시 <strong>파일 통째 읽기</strong> 대신 필요 심볼만</li>
<li>Claude Code 세션 시작 시 <code>initial_instructions</code> 한 번 호출</li>
</ul>
<blockquote>
<p><strong>둘 다 Claude Code 전용</strong> — Codex CLI 사용자에겐 해당 없음</p>
</blockquote>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-marpit-scope-ZUtuEVBg="" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="24" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="%EA%B7%B8-%EC%99%B8-%ED%86%A0%ED%81%B0-%EC%A0%88%EC%95%BD--%EC%84%A4%EC%A0%95%EC%9C%BC%EB%A1%9C-%EC%A4%84%EC%9D%B4%EA%B8%B0">그 외 토큰 절약 — 설정으로 줄이기</h2>
<div class="cols">
<div class="col">
<h3 id="%F0%9F%93%84-claudeignore"><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <code>.claudeignore</code></h3>
<p>Claude Code가 읽지 말아야 할 파일·폴더 차단</p>
<pre><code># .claudeignore (프로젝트 루트에 생성)
node_modules/
dist/
*.lock
*.log
coverage/
</code></pre>
<p>→ 탐색 시 통째로 컨텍스트에 실려오는 낭비 방지</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="25" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h3 id="%E2%9A%A1-compact-%EB%AA%85%EB%A0%B9"><img class="emoji" draggable="false" alt="⚡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a1.svg" data-marp-twemoji=""/> <code>/compact</code> 명령</h3>
<p>대화가 길어지면 히스토리를 <strong>AI가 직접 요약 압축</strong></p>
<pre><code>/compact
→ 현재까지 대화를 요약본으로 교체
→ 이후 토큰 사용량 리셋 효과
</code></pre>
</div>
<div class="col">
<h3 id="%F0%9F%97%82%EF%B8%8F-claudemd-%EB%B6%84%EB%A6%AC-lazy-loading"><img class="emoji" draggable="false" alt="🗂️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5c2.svg" data-marp-twemoji=""/> CLAUDE.md 분리 (Lazy Loading)</h3>
<p>전역 CLAUDE.md는 <strong>매 세션 자동 로드</strong> → 짧을수록 유리</p>
<pre><code># 나쁜 예 — 모든 규칙을 전역에 다 쓰기
~/.claude/CLAUDE.md  ← 수백 줄 규칙

# 좋은 예 — 필요한 것만 @참조로 분리
~/.claude/CLAUDE.md  ← 핵심 10줄만
  @rules/api.md       ← API 작업할 때만
  @rules/deploy.md    ← 배포할 때만
</code></pre>
<p>서브 프로젝트별 <code>.claude/CLAUDE.md</code> 분리도 가능<br />
→ 해당 폴더 작업 시에만 로드</p>
<blockquote>
<p><strong>공통점</strong> : 설정 한 번으로 매 세션 자동 적용 — 별도 명령 불필요</p>
</blockquote>
</div>

<h1 id="%EC%A0%95%EB%A6%AC">정리</h1>
<h2 id="%EB%82%98%EB%A7%8C%EC%9D%98-ai-%EA%B0%9C%EB%B0%9C-%ED%99%98%EA%B2%BD-%EB%A1%9C%EB%93%9C%EB%A7%B5">나만의 AI 개발 환경 로드맵</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="clean" lang="ko-KR" data-marpit-pagination="27" style="--paginate:true;--theme:clean;" data-marpit-pagination-total="27">
<h2 id="%EB%8B%A8%EA%B3%84%EB%B3%84-%EA%B5%AC%EC%B6%95-%EC%88%9C%EC%84%9C">단계별 구축 순서</h2>
<div class="cols">
<div class="col">
<h3 id="phase-1--%EA%B8%B0%EC%B4%88-1%EC%A3%BC%EC%9D%BC">Phase 1 — 기초 (1주일)</h3>
<ol>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>Marp CLI</strong> 설치<br />
→ 발표 자료를 MD로 관리 시작</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>Tailscale</strong> 설치<br />
→ 노트북 + 집 컴퓨터 + 스마트폰 연결</li>
</ol>
<h3 id="phase-2--%EC%97%B0%EA%B2%B0-23%EC%A3%BC">Phase 2 — 연결 (2~3주)</h3>
<ol start="3">
<li><img class="emoji" draggable="false" alt="🔗" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f517.svg" data-marp-twemoji=""/> <strong>Codex SSH</strong> 설정<br />
→ Codex CLI로 원격 서버에 자연어로 명령</li>
<li><img class="emoji" draggable="false" alt="🔗" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f517.svg" data-marp-twemoji=""/> <strong>gog CLI</strong> 인증<br />
→ 구글 서비스 터미널 연동</li>
</ol>
</div>
<div class="col">
<h3 id="phase-3--ai-%EC%8B%AC%ED%99%94-%ED%95%9C-%EB%8B%AC">Phase 3 — AI 심화 (한 달+)</h3>
<ol start="5">
<li><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> <strong>Hermes Agent</strong> 설치<br />
→ Telegram 연동, 개인화 시작</li>
<li><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> <strong>Claude Code / Codex</strong> 원격 서버 실행<br />
→ 노트북 배터리 아끼며 AI 풀 활용</li>
<li><img class="emoji" draggable="false" alt="🎨" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3a8.svg" data-marp-twemoji=""/> <strong>OpenDesign</strong> 활용<br />
→ 포트폴리오/발표용 비주얼 AI로 빠르게 제작</li>
</ol>
<h3 id="%ED%95%B5%EC%8B%AC-%EC%9B%90%EC%B9%99-3%EA%B0%80%EC%A7%80">핵심 원칙 3가지</h3>
<ul>
<li><strong>Tailscale 먼저</strong> — 보안 기반 없이 포트 열지 말 것</li>
<li><strong>AI에게 도움 받기</strong> — 설정 막히면 그냥 물어봐</li>
<li><strong>한 번에 다 하려 하지 말 것</strong> — Phase별로 천천히</li>
</ul>
</div>
</div>
<hr />
<p><em>도구는 수단이다. 일단 하나씩 써보는 것이 가장 빠른 학습이다.</em></p>
